name: example_dart_pub
version: 1.0.0
description: >-
  Dart project with a mix of safe, vulnerable, runtime, and dev
  dependencies for bomly QA.

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  path: ^1.9.0
  # archive 3.3.0: CVE-2023-36090 (directory traversal via crafted ZIP)
  archive: 3.3.0
  http: ^1.2.2
  # yaml: YAML parsing
  yaml: ^3.1.2
  # intl: internationalization utilities
  intl: ^0.18.0
  # crypto: cryptographic functions
  crypto: ^3.0.3
  # logging: structured logging
  logging: ^1.2.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.8
  mockito: ^5.4.4
